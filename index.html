    <script>
        // 课程表状态卡片逻辑
        (function() {
            let timetableData = null;
            let updateInterval = null;

            const WEEKDAY_LABELS = {
                1: '周一', 2: '周二', 3: '周三', 4: '周四', 5: '周五', 6: '周六', 7: '周日'
            };

            function parseDate(ymd) {
                const parts = ymd.split('-').map(Number);
                if (parts.length !== 3) return null;
                return new Date(parts[0], parts[1] - 1, parts[2]);
            }

            function calculateCurrentWeek(startDate, maxWeek) {
                const start = parseDate(startDate);
                if (!start) return 1;
                const now = new Date();
                const diffDays = Math.floor((now - start) / (24 * 60 * 60 * 1000));
                const week = Math.floor(diffDays / 7) + 1;
                return Math.max(1, Math.min(week, maxWeek));
            }

            function parseTimeToMinute(text) {
                const parts = String(text || '').split(':');
                if (parts.length !== 2) return null;
                const hour = Number(parts[0]);
                const minute = Number(parts[1]);
                if (!Number.isFinite(hour) || !Number.isFinite(minute)) return null;
                return hour * 60 + minute;
            }

            function formatDuration(totalSeconds) {
                const safeSecs = Math.max(0, Math.floor(totalSeconds));
                const hours = Math.floor(safeSecs / 3600);
                const minutes = Math.floor((safeSecs % 3600) / 60);
                const seconds = safeSecs % 60;

                const parts = [];
                if (hours > 0) parts.push(`${hours}时`);
                if (minutes > 0) parts.push(`${minutes}分钟`);
                if (seconds > 0 || parts.length === 0) parts.push(`${seconds}秒`);
                return parts.join('');
            }

            function hexToRgb(hex) {
                hex = hex.replace('#', '');
                if (hex.length === 8) {
                    const r = parseInt(hex.substring(2, 4), 16);
                    const g = parseInt(hex.substring(4, 6), 16);
                    const b = parseInt(hex.substring(6, 8), 16);
                    return `rgb(${r}, ${g}, ${b})`;
                }
                if (hex.length === 6) {
                    const r = parseInt(hex.substring(0, 2), 16);
                    const g = parseInt(hex.substring(2, 4), 16);
                    const b = parseInt(hex.substring(4, 6), 16);
                    return `rgb(${r}, ${g}, ${b})`;
                }
                return 'inherit';
            }

            function getTodayCourses(data, now) {
                const currentWeek = calculateCurrentWeek(data.settings.startDate, data.settings.maxWeek);
                const day = now.getDay() === 0 ? 7 : now.getDay();

                // 检查是否需要显示周末
                const weekendDisplay = data.settings.weekendDisplay;
                let showWeekend = false;
                if (weekendDisplay && weekendDisplay.enabled) {
                    showWeekend = weekendDisplay.days.includes('sat') && weekendDisplay.weeks.includes(currentWeek);
                }

                // 如果是周末且不显示周末，返回空
                if (day >= 6 && !showWeekend && !data.settings.showSat) {
                    return [];
                }

                const courses = [];
                data.schedules.forEach(schedule => {
                    if (currentWeek < schedule.startWeek || currentWeek > schedule.endWeek) return;
                    if (schedule.day !== day) return;

                    const courseDef = data.courses.find(c => c.id === schedule.id);
                    if (!courseDef) return;

                    const startNode = schedule.startNode;
                    const endNode = startNode + schedule.step - 1;
                    const nodeTime = data.timeTable.find(nt => nt.node === startNode);
                    const endNodeTime = data.timeTable.find(nt => nt.node === endNode);

                    if (!nodeTime) return;

                    const startMinute = parseTimeToMinute(nodeTime.startTime);
                    const endMinute = endNodeTime ? parseTimeToMinute(endNodeTime.endTime) : parseTimeToMinute(nodeTime.endTime);

                    if (startMinute === null || endMinute === null) return;

                    courses.push({
                        courseName: courseDef.courseName,
                        color: courseDef.color || '#666666',
                        room: schedule.room || '未知',
                        teacher: schedule.teacher || '',
                        startMinute,
                        endMinute,
                        startTime: nodeTime.startTime,
                        endTime: endNodeTime ? endNodeTime.endTime : nodeTime.endTime
                    });
                });

                return courses.sort((a, b) => a.startMinute - b.startMinute);
            }

            function getNextWeekFirstCourse(data) {
                const currentWeek = calculateCurrentWeek(data.settings.startDate, data.settings.maxWeek);
                const nextWeek = currentWeek + 1;

                if (nextWeek > data.settings.maxWeek) return null;

                // 获取下周一的课程
                let allCourses = [];
                data.schedules.forEach(schedule => {
                    if (nextWeek < schedule.startWeek || nextWeek > schedule.endWeek) return;
                    if (schedule.day !== 1) return; // 只找周一的课程

                    const courseDef = data.courses.find(c => c.id === schedule.id);
                    if (!courseDef) return;

                    const startNode = schedule.startNode;
                    const nodeTime = data.timeTable.find(nt => nt.node === startNode);
                    if (!nodeTime) return;

                    const startMinute = parseTimeToMinute(nodeTime.startTime);
                    if (startMinute === null) return;

                    allCourses.push({
                        courseName: courseDef.courseName,
                        color: courseDef.color || '#666666',
                        room: schedule.room || '未知',
                        startMinute,
                        startTime: nodeTime.startTime
                    });
                });

                if (allCourses.length === 0) return null;
                return allCourses.sort((a, b) => a.startMinute - b.startMinute)[0];
            }

            function resolveStatus(data) {
                const now = new Date();
                const currentSecond = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
                const currentMinute = Math.floor(currentSecond / 60);
                const day = now.getDay() === 0 ? 7 : now.getDay();

                const courses = getTodayCourses(data, now);

                // 周末或无课
                if (courses.length === 0 || day >= 6) {
                    const nextCourse = getNextWeekFirstCourse(data);
                    if (nextCourse) {
                        const daysUntil = day >= 6 ? (8 - day) : 1;
                        const secondsUntil = daysUntil * 86400 + nextCourse.startMinute * 60 - currentSecond;
                        return {
                            status: '本周课毕',
                            lines: [
                                { text: '下周首节：', bold: false },
                                { text: `${nextCourse.courseName} - ${nextCourse.room}`, bold: true, color: hexToRgb(nextCourse.color) },
                                { text: '距上课还有：', bold: false, prefix: true },
                                { text: formatDuration(secondsUntil), bold: true }
                            ]
                        };
                    }
                    return { status: '本周课毕', lines: [] };
                }

                // 查找当前状态
                for (let i = 0; i < courses.length; i++) {
                    const current = courses[i];
                    const next = courses[i + 1];

                    // 上课中
                    if (currentMinute >= current.startMinute && currentMinute < current.endMinute) {
                        const remainSeconds = current.endMinute * 60 - currentSecond;
                        const lines = [
                            { text: '本节：', bold: false },
                            { text: `${current.courseName} - ${current.room}`, bold: true, color: hexToRgb(current.color) }
                        ];
                        if (next) {
                            lines.push({ text: '下节：', bold: false, prefix: true });
                            lines.push({ text: `${next.courseName} - ${next.room}`, bold: false, color: hexToRgb(next.color) });
                        }
                        lines.push({ text: '距下课还有：', bold: false, prefix: true });
                        lines.push({ text: formatDuration(remainSeconds), bold: true });
                        return { status: '上课中', lines };
                    }

                    // 课间
                    if (next && currentMinute >= current.endMinute && currentMinute < next.startMinute) {
                        const remainSeconds = next.startMinute * 60 - currentSecond;
                        return {
                            status: '课间',
                            lines: [
                                { text: '下节：', bold: false },
                                { text: `${next.courseName} - ${next.room}`, bold: true, color: hexToRgb(next.color) },
                                { text: '距上课还有：', bold: false, prefix: true },
                                { text: formatDuration(remainSeconds), bold: true }
                            ]
                        };
                    }
                }

                // 今日课毕
                const lastCourse = courses[courses.length - 1];
                if (currentMinute >= lastCourse.endMinute) {
                    const nextCourse = getNextWeekFirstCourse(data);
                    if (nextCourse) {
                        const daysUntil = 8 - day; // 到下周一
                        const secondsUntil = daysUntil * 86400 + nextCourse.startMinute * 60 - currentSecond;
                        return {
                            status: '今日课毕',
                            lines: [
                                { text: '下周首节：', bold: false },
                                { text: `${nextCourse.courseName} - ${nextCourse.room}`, bold: true, color: hexToRgb(nextCourse.color) },
                                { text: '距上课还有：', bold: false, prefix: true },
                                { text: formatDuration(secondsUntil), bold: true }
                            ]
                        };
                    }
                    return { status: '今日课毕', lines: [] };
                }

                // 第一节课前
                const firstCourse = courses[0];
                const remainSeconds = firstCourse.startMinute * 60 - currentSecond;
                return {
                    status: '课前',
                    lines: [
                        { text: '首节：', bold: false },
                        { text: `${firstCourse.courseName} - ${firstCourse.room}`, bold: true, color: hexToRgb(firstCourse.color) },
                        { text: '距上课还有：', bold: false, prefix: true },
                        { text: formatDuration(remainSeconds), bold: true }
                    ]
                };
            }

            function renderStatus(status) {
                const container = document.getElementById('timetable-status');
                if (!container) return;

                let html = `<div class="timetable-status-header">${status.status}</div>`;

                if (status.lines.length > 0) {
                    html += '<div class="timetable-status-lines">';
                    let currentLine = '<div class="timetable-status-line">';
                    status.lines.forEach((line, index) => {
                        const style = line.color ? `style="color: ${line.color}"` : '';
                        const className = line.bold ? 'timetable-status-bold' : '';
                        if (line.prefix && index > 0) {
                            currentLine += '</div><div class="timetable-status-line">';
                        }
                        currentLine += `<span class="${className}" ${style}>${line.text}</span>`;
                    });
                    currentLine += '</div>';
                    html += currentLine + '</div>';
                }

                container.innerHTML = html;
            }

            function update() {
                if (!timetableData) return;
                const status = resolveStatus(timetableData);
                renderStatus(status);
            }

            async function init() {
                try {
                    const response = await fetch('/大三下.json');
                    timetableData = await response.json();

                    const card = document.getElementById('timetable-card');
                    if (card) card.style.display = 'block';

                    update();
                    updateInterval = setInterval(update, 1000);
                } catch (error) {
                    console.error('加载课程表失败:', error);
                }
            }

            // 页面加载完成后初始化
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            // 清理定时器
            window.addEventListener('beforeunload', () => {
                if (updateInterval) clearInterval(updateInterval);
            });
        })();
    </script>
</body>
